services:
  db:
    image: mariadb:10.11
    container_name: sool-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: sool
      MYSQL_USER: sool
      MYSQL_PASSWORD: soolpass
    ports:
      - "3306:3306"
    volumes:
      - sool_mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: sool-backend
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_USER=sool
      - DB_PASSWORD=soolpass
      - DB_NAME=sool
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app  # ⭐ 로컬 백엔드 코드 연동 (실시간 반영)
      - ./backend/app/static:/app/app/static
    # FastAPI 개발용 핫 리로딩 활성화
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    build:
      context: ./frontend
      target: runner
    container_name: sool-frontend
    ports:
      - "3300:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - WATCHPACK_POLLING=true # 도커 환경에서 핫 리로딩 신뢰성 향상
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  sool_mariadb_data:
